<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ColorDream - Éditeur</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#16213e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="editor-page">

  <!-- HEADER ÉDITEUR -->
  <div class="editor-header">
    <button class="back-btn" onclick="window.location.href='index.html'">
      <i class="fas fa-arrow-left"></i> Retour
    </button>
    <span class="editor-title" id="editorTitle">Coloriage</span>
    <div class="editor-actions">
      <button class="btn-editor btn-undo" id="undoBtn" title="Annuler (Ctrl+Z)">
        <i class="fas fa-undo"></i>
      </button>
      <button class="btn-editor btn-undo" id="redoBtn" title="Rétablir (Ctrl+Y)">
        <i class="fas fa-redo"></i>
      </button>
      <button class="btn-editor btn-clear" id="clearBtn">
        <i class="fas fa-trash"></i> Effacer
      </button>
      <button class="btn-editor btn-save" id="saveBtn">
        <i class="fas fa-download"></i> Sauvegarder
      </button>
    </div>
  </div>

  <!-- TOOLBAR OUTILS -->
  <div class="editor-toolbar">

    <!-- Outils -->
    <div class="tool-group">
      <label>Outil</label>
      <button class="tool-btn active" id="toolPen" title="Stylo (p)">✏️</button>
      <button class="tool-btn" id="toolBrush" title="Pinceau (b)">🖌️</button>
      <button class="tool-btn" id="toolFill" title="Remplissage (f)">🪣</button>
      <button class="tool-btn" id="toolEraser" title="Gomme (e)">🧹</button>
      <button class="tool-btn" id="toolEyedrop" title="Pipette (i)">💉</button>
    </div>

    <!-- Stabilisateur -->
    <div class="tool-group">
      <label>Stabilisateur <span id="stabVal">0</span></label>
      <input type="range" class="size-slider" id="stabSlider" min="0" max="9" value="0" />
    </div>

    <!-- Couleurs -->
    <div class="tool-group" style="flex-direction:column;align-items:flex-start;gap:6px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px;">
        <label>Couleur</label>
        <div id="activeColorSwatch" style="width:28px;height:28px;border-radius:50%;background:#ff6eb4;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);flex-shrink:0;" title="Couleur active"></div>
        <div id="recentColors" style="display:flex;gap:5px;align-items:center;"></div>
      </div>
      <div class="color-palette" id="colorPalette">
        <!-- Noirs / Gris -->
        <div class="color-dot active" style="background:#000000" data-color="#000000"></div>
        <div class="color-dot" style="background:#2d2d2d" data-color="#2d2d2d"></div>
        <div class="color-dot" style="background:#666666" data-color="#666666"></div>
        <div class="color-dot" style="background:#999999" data-color="#999999"></div>
        <div class="color-dot" style="background:#cccccc" data-color="#cccccc"></div>
        <div class="color-dot" style="background:#ffffff;border:2px solid #ddd" data-color="#ffffff"></div>
        <!-- Rouges / Roses -->
        <div class="color-dot" style="background:#ff0000" data-color="#ff0000"></div>
        <div class="color-dot" style="background:#cc0000" data-color="#cc0000"></div>
        <div class="color-dot" style="background:#ff4444" data-color="#ff4444"></div>
        <div class="color-dot" style="background:#ff8080" data-color="#ff8080"></div>
        <div class="color-dot" style="background:#ffb3b3" data-color="#ffb3b3"></div>
        <div class="color-dot" style="background:#ff1493" data-color="#ff1493"></div>
        <div class="color-dot" style="background:#ff69b4" data-color="#ff69b4"></div>
        <div class="color-dot" style="background:#ff6eb4" data-color="#ff6eb4"></div>
        <div class="color-dot" style="background:#ffb6c1" data-color="#ffb6c1"></div>
        <div class="color-dot" style="background:#ffc0cb" data-color="#ffc0cb"></div>
        <!-- Oranges -->
        <div class="color-dot" style="background:#ff6600" data-color="#ff6600"></div>
        <div class="color-dot" style="background:#ff9900" data-color="#ff9900"></div>
        <div class="color-dot" style="background:#ffaa33" data-color="#ffaa33"></div>
        <div class="color-dot" style="background:#ffcc88" data-color="#ffcc88"></div>
        <div class="color-dot" style="background:#ff8c00" data-color="#ff8c00"></div>
        <!-- Jaunes -->
        <div class="color-dot" style="background:#ffd200" data-color="#ffd200"></div>
        <div class="color-dot" style="background:#ffee00" data-color="#ffee00"></div>
        <div class="color-dot" style="background:#ffff00" data-color="#ffff00"></div>
        <div class="color-dot" style="background:#ffffaa" data-color="#ffffaa"></div>
        <div class="color-dot" style="background:#f0e68c" data-color="#f0e68c"></div>
        <!-- Verts -->
        <div class="color-dot" style="background:#006600" data-color="#006600"></div>
        <div class="color-dot" style="background:#008800" data-color="#008800"></div>
        <div class="color-dot" style="background:#00cc00" data-color="#00cc00"></div>
        <div class="color-dot" style="background:#56ab2f" data-color="#56ab2f"></div>
        <div class="color-dot" style="background:#90ee90" data-color="#90ee90"></div>
        <div class="color-dot" style="background:#00ff7f" data-color="#00ff7f"></div>
        <div class="color-dot" style="background:#43c6ac" data-color="#43c6ac"></div>
        <div class="color-dot" style="background:#98fb98" data-color="#98fb98"></div>
        <!-- Bleus -->
        <div class="color-dot" style="background:#00008b" data-color="#00008b"></div>
        <div class="color-dot" style="background:#0000ff" data-color="#0000ff"></div>
        <div class="color-dot" style="background:#1e90ff" data-color="#1e90ff"></div>
        <div class="color-dot" style="background:#4facfe" data-color="#4facfe"></div>
        <div class="color-dot" style="background:#87ceeb" data-color="#87ceeb"></div>
        <div class="color-dot" style="background:#b0e0ff" data-color="#b0e0ff"></div>
        <div class="color-dot" style="background:#00ced1" data-color="#00ced1"></div>
        <div class="color-dot" style="background:#40e0d0" data-color="#40e0d0"></div>
        <!-- Violets -->
        <div class="color-dot" style="background:#4b0082" data-color="#4b0082"></div>
        <div class="color-dot" style="background:#764ba2" data-color="#764ba2"></div>
        <div class="color-dot" style="background:#9400d3" data-color="#9400d3"></div>
        <div class="color-dot" style="background:#ba55d3" data-color="#ba55d3"></div>
        <div class="color-dot" style="background:#da70d6" data-color="#da70d6"></div>
        <div class="color-dot" style="background:#dda0dd" data-color="#dda0dd"></div>
        <div class="color-dot" style="background:#e6b0ff" data-color="#e6b0ff"></div>
        <!-- Marrons / Beiges / Peaux -->
        <div class="color-dot" style="background:#3b1a08" data-color="#3b1a08"></div>
        <div class="color-dot" style="background:#8B4513" data-color="#8B4513"></div>
        <div class="color-dot" style="background:#a0522d" data-color="#a0522d"></div>
        <div class="color-dot" style="background:#cd853f" data-color="#cd853f"></div>
        <div class="color-dot" style="background:#deb887" data-color="#deb887"></div>
        <div class="color-dot" style="background:#f5deb3" data-color="#f5deb3"></div>
        <div class="color-dot" style="background:#ffe4c4" data-color="#ffe4c4"></div>
        <div class="color-dot" style="background:#ffdead" data-color="#ffdead"></div>
        <div class="color-dot" style="background:#ffcba4" data-color="#ffcba4"></div>
        <div class="color-dot" style="background:#f4a460" data-color="#f4a460"></div>
      </div>
      <div class="color-input-wrap" title="Couleur personnalisée">
        <input type="color" id="customColor" value="#000000" />
      </div>
    </div>

    <!-- Taille -->
    <div class="tool-group">
      <label>Taille <span id="sizeVal">8</span>px</label>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="60" value="8" />
    </div>

    <!-- Opacité -->
    <div class="tool-group">
      <label>Opacité <span id="opacityVal">100</span>%</label>
      <input type="range" class="opacity-slider" id="opacitySlider" min="10" max="100" value="100" />
    </div>

  </div>

  <!-- CANVAS -->
  <div class="editor-canvas-wrap">
    <!-- Canvas de base : coloriage fixe (jamais effacé) -->
    <canvas id="baseCanvas" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;border-radius:4px;"></canvas>
    <!-- Canvas de dessin : couleurs par-dessus (effaçable) -->
    <canvas id="drawingCanvas" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:4px;cursor:crosshair;"></canvas>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn" title="Zoom +">+</button>
      <button class="zoom-btn" id="zoomOut" title="Zoom -">−</button>
      <button class="zoom-btn" id="zoomReset" title="Réinitialiser">⊙</button>
    </div>
  </div>

  <script src="svgdata.js"></script>
  <script src="editor.js"></script>
</body>
</html>
